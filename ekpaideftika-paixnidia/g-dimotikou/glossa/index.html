<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Γλώσσα Γ΄ Δημοτικού – Learning Fast</title>
  <link rel="stylesheet" href="../../../styles/main.css" />
  <style>
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    .game-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 2.2rem 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      text-decoration: none;
      color: inherit;
    }
    .game-card:hover { transform: translateY(-7px); box-shadow: 0 14px 40px rgba(79,110,247,.22); }
    .game-card__icon {
      font-size: 3rem;
      width: 85px; height: 85px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg,#4f6ef7,#7c9aff);
    }
    .game-card__title { font-size: 1.2rem; font-weight: 800; color: var(--text); }
    .game-card__btn {
      padding: .55rem 1.6rem;
      border-radius: 999px;
      background: linear-gradient(135deg,#4f6ef7,#7c9aff);
      color: #fff;
      font-size: .85rem;
      font-weight: 700;
    }
    .breadcrumb { font-size:.85rem; color:var(--muted); margin-bottom:.6rem; }
    .breadcrumb a { color:var(--primary); font-weight:600; }
    .breadcrumb a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <ul class="navbar__links">
        <li><a href="../../../index.html">Αρχική</a></li>
        <li><a href="../../../taxeis/index.html">Τάξεις</a></li>
        <li><a href="../../../eidiki-ekpaideysi/index.html">Ειδική Εκπαίδευση</a></li>
        <li><a href="../../index.html" class="active">Εκπαιδευτικά Παιχνίδια</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section>
      <div class="section__header">
        <p class="breadcrumb">
          <a href="../../index.html">Εκπαιδευτικά Παιχνίδια</a> →
          <a href="../index.html">Γ΄ Δημοτικού</a>
        </p>
        <span class="section__label">📖 Γλώσσα – Γ΄ Δημοτικού</span>
        <h1 class="section__title">Γλώσσα</h1>
        <p class="section__subtitle">Επίλεξε παιχνίδι και ξεκίνα!</p>
      </div>
      <div class="games-grid">
        <a href="orthografia/index.html" class="game-card">
          <div class="game-card__icon">✏️</div>
          <div class="game-card__title">Ορθογραφία</div>
          <span class="game-card__btn">Παίξε →</span>
        </a>
      </div>
    </section>
  </main>
  <footer class="footer">
    <div class="footer__logo"><img src="../../../assets/images/logo.png" alt="Learning Fast Logo" /></div>
    <ul class="footer__links">
      <li><a href="../../../index.html">Αρχική</a></li>
      <li><a href="../../index.html">Εκπαιδευτικά Παιχνίδια</a></li>
    </ul>
    <p class="footer__copy">© 2026 Learning Fast. Όλα τα δικαιώματα διατηρούνται.</p>
  </footer>
</body>
</html>
